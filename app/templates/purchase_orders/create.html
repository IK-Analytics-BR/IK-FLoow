{% extends 'base.html' %}

{% block title %}Novo Pedido de Compra{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2">Novo Pedido de Compra</h1>
        <div class="btn-toolbar mb-2 mb-md-0">
            <a href="{{ url_for('purchase_orders.purchase_order_list') }}" class="btn btn-sm btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
        </div>
    </div>

    <form method="post">
        <div class="card mb-4">
            <div class="card-header">
                <i class="fas fa-file-invoice me-1"></i> Dados do Pedido
            </div>
            <div class="card-body">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <div class="form-floating mb-3">
                            <select class="form-select" id="supplier_id" name="supplier_id" required>
                                <option value="">Selecione um fornecedor</option>
                                {% for supplier in suppliers %}
                                <option value="{{ supplier.id }}">{{ supplier.name }}</option>
                                {% endfor %}
                            </select>
                            <label for="supplier_id">Fornecedor <span class="text-danger">*</span></label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating mb-3">
                            <input type="date" class="form-control" id="order_date" name="order_date" value="{{ today }}" required>
                            <label for="order_date">Data do Pedido <span class="text-danger">*</span></label>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="form-floating mb-3">
                            <input type="date" class="form-control" id="delivery_date" name="delivery_date">
                            <label for="delivery_date">Previsão de Entrega</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-grid gap-2 d-md-flex justify-content-md-end mb-4">
            <a href="{{ url_for('purchase_orders.purchase_order_list') }}" class="btn btn-secondary me-md-2">Cancelar</a>
            <button type="submit" class="btn btn-primary">Criar Pedido</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Inicializar Select2 para fornecedores se disponível
        if ($.fn.select2) {
            $('#supplier_id').select2({
                theme: 'bootstrap-5',
                placeholder: 'Selecione um fornecedor'
            });
        }
    });
</script>
{% endblock %}
