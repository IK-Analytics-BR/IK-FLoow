{% extends "base.html" %}

{% block title %}{{ 'Editar' if moeda else 'Nova' }} Moeda{% endblock %}

{% block content %}
<div class="container-fluid py-3">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <!-- Cabeçalho -->
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">
                    <i class="fas fa-coins me-2"></i>
                    {{ 'Editar' if moeda else 'Nova' }} Moeda
                </h4>
                <a href="{{ url_for('currency.lista') }}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-1"></i> Voltar
                </a>
            </div>

            <!-- Formulário -->
            <div class="card">
                <div class="card-body">
                    <form action="{{ url_for('currency.salvar') }}" method="POST">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label">Código <span class="text-danger">*</span></label>
                                <input type="text" name="code" class="form-control" required maxlength="3"
                                       value="{{ moeda.code if moeda else '' }}"
                                       placeholder="Ex: BRL" style="text-transform: uppercase;"
                                       {% if moeda %}readonly{% endif %}>
                                <small class="text-muted">Código ISO 4217 (3 letras)</small>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label">Nome <span class="text-danger">*</span></label>
                                <input type="text" name="name" class="form-control" required
                                       value="{{ moeda.name if moeda else '' }}"
                                       placeholder="Ex: Real Brasileiro">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Símbolo</label>
                                <input type="text" name="symbol" class="form-control" maxlength="8"
                                       value="{{ moeda.symbol if moeda else '' }}"
                                       placeholder="Ex: R$">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label">Decimais</label>
                                <input type="number" name="decimal_places" class="form-control" min="0" max="8"
                                       value="{{ moeda.decimal_places if moeda else 2 }}">
                            </div>
                        </div>

                        <div class="row g-3 mt-3">
                            <div class="col-md-3">
                                <label class="form-label d-block">&nbsp;</label>
                                <div class="form-check mt-2">
                                    <input type="checkbox" name="active" class="form-check-input" id="active"
                                           {{ 'checked' if not moeda or moeda.active else '' }}>
                                    <label class="form-check-label" for="active">Ativa</label>
                                </div>
                            </div>
                        </div>

                        <!-- Botões -->
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="{{ url_for('currency.lista') }}" class="btn btn-secondary">
                                <i class="fas fa-times me-1"></i> Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save me-1"></i> Salvar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
