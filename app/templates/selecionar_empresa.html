{% extends "base.html" %}

{% block title %}Selecionar Empresa{% endblock %}

{% block content %}
<div class="container-fluid px-4">
    <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
        <h1 class="h2"><i class="fas fa-building me-2"></i>Selecionar Empresa</h1>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-sign-in-alt me-1"></i>
                    Escolha a empresa para acessar
                </div>
                <div class="card-body">
                    <form method="post" action="{{ url_for('selecionar_empresa') }}">
                        <div class="mb-3">
                            <label for="empresa_id" class="form-label">Empresa</label>
                            <select class="form-select" id="empresa_id" name="empresa_id" required>
                                <option value="">Selecione...</option>
                                {% for e in empresas %}
                                    <option value="{{ e.id }}">{{ e.nome }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-check me-2"></i>Entrar
                            </button>
                            <a href="{{ url_for('logout') }}" class="btn btn-outline-secondary">
                                <i class="fas fa-sign-out-alt me-2"></i>Sair
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
