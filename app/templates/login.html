<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IKFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 15px;
        }
        .card {
            border-radius: 10px;
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }
        .card-header {
            background: #ffffff;
            color: #0b2447;
            text-align: center;
            border-radius: 10px 10px 0 0 !important;
            padding: 34px 20px;
            border-bottom: 1px solid rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }
        .card-header h3 {
            margin-bottom: 0;
        }
        .card-body {
            padding: 30px;
        }
        .form-floating {
            margin-bottom: 20px;
        }

        .form-floating > .form-control {
            height: calc(4.1rem + 2px);
            padding: 1.15rem 0.95rem;
            font-size: 1.05rem;
        }

        .form-floating > label {
            padding: 1.15rem 0.95rem;
        }
        .btn-login {
            background-color: #007bff;
            border-color: #007bff;
            width: 100%;
            padding: 10px;
            font-weight: 500;
        }
        .btn-login:hover {
            background-color: #0069d9;
            border-color: #0062cc;
        }
        .system-logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .login-logo {
            display: block;
            margin: 0 auto;
            height: 120px;
            max-width: 380px;
            width: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div class="login-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <div class="card">
            <div class="card-header">
                <img
                    src="{{ url_for('static', filename='img/logo_ikflow.png') }}"
                    alt="IK Flow"
                    class="login-logo"
                >
            </div>
            <div class="card-body">
                <form method="post" action="{{ url_for('login') }}">
                    <div class="form-floating">
                        <input type="text" class="form-control" id="username" name="username" placeholder="Nome de usuário" autocomplete="username" required autofocus>
                        <label for="username">Nome de usuário</label>
                    </div>
                    <div class="form-floating">
                        <input type="password" class="form-control" id="password" name="password" placeholder="Senha" autocomplete="current-password" required>
                        <label for="password">Senha</label>
                    </div>
                    <button class="btn btn-primary btn-login" type="submit">
                        <i class="fas fa-sign-in-alt me-2"></i> Entrar
                    </button>
                </form>
                
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
