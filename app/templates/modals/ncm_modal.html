<!-- Modal de Busca de NCM -->
<div class="modal fade" id="ncmSearchModal" tabindex="-1" aria-labelledby="ncmSearchModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="ncmSearchModalLabel">Buscar NCM</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
      </div>
      <div class="modal-body">
        <div class="row mb-3">
          <div class="col-md-12">
            <div class="input-group">
              <input type="text" class="form-control" id="ncmSearchInput" placeholder="Digite o código ou descrição do NCM (mínimo 3 caracteres)">
              <button class="btn btn-primary" type="button" id="ncmSearchButton">
                <i class="fas fa-search"></i> Buscar
              </button>
            </div>
          </div>
        </div>
        
        <div class="table-responsive">
          <table class="table table-striped table-hover" id="ncmResultsTable">
            <thead>
              <tr>
                <th>Código</th>
                <th>Descrição</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody>
              <!-- Resultados da busca serão inseridos aqui -->
            </tbody>
          </table>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
      </div>
    </div>
  </div>
</div>
